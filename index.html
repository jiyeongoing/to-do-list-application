<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#f7f6f2">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Swipe Todo">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>Swipe Todo</title>
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="icon" href="icons/app-icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="icons/app-icon.svg">
    <link rel="stylesheet" href="styles.css">
    <script src="app.js" defer></script>
  </head>
  <body>
    <main class="prototype">
      <section class="phone" aria-label="Swipe Todo 앱">

        <div id="today-view" class="view active">
          <header class="screen-header">
            <div>
              <h2 id="today-title">오늘</h2>
              <p id="today-count" class="subline"></p>
            </div>
            <time id="today-date" class="date-label"></time>
          </header>

          <nav class="segmented" aria-label="기본 목록">
            <button type="button" class="segment active" data-view="today-view">오늘</button>
            <button type="button" class="segment" data-view="daily-view">데일리</button>
          </nav>

          <form id="today-form" class="entry">
            <label class="sr-only" for="today-input">오늘 할 일</label>
            <input id="today-input" placeholder="할 일" autocomplete="off" required>
            <button type="submit">추가</button>
          </form>

          <div id="today-items" class="items"></div>
          <div id="arrived-lists" class="items cards"></div>
          <div id="done-items" class="items completed"></div>

          <button type="button" class="plan-link" data-view="plan-view">계획하기 <span>→</span></button>
        </div>

        <div id="daily-view" class="view">
          <header class="screen-header">
            <div>
              <h2 id="daily-title">데일리루틴</h2>
            </div>
          </header>

          <nav class="segmented" aria-label="기본 목록">
            <button type="button" class="segment" data-view="today-view">오늘</button>
            <button type="button" class="segment active" data-view="daily-view">데일리</button>
          </nav>

          <form id="daily-form" class="entry">
            <label class="sr-only" for="daily-input">반복 루틴</label>
            <input id="daily-input" placeholder="루틴" autocomplete="off" required>
            <button type="submit">추가</button>
          </form>

          <div id="daily-items" class="items"></div>
        </div>

        <div id="plan-view" class="view">
          <header class="screen-header back-header">
            <div>
              <h2 id="plan-title">계획</h2>
            </div>
            <div class="plan-header-actions">
              <button class="back" type="button" data-view="today-view">닫기</button>
              <button id="today-jump-button" class="back" type="button">오늘</button>
              <label class="calendar-jump" aria-label="날짜 선택">
                <span aria-hidden="true">&#128197;</span>
                <input id="calendar-input" type="date">
              </label>
            </div>
          </header>

          <div class="month-navigation">
            <div id="month-picker" class="month-picker" aria-label="계획 월 선택"></div>
          </div>

          <div class="date-navigation">
            <button type="button" id="previous-date" class="arrow" aria-label="이전 날짜">‹</button>
            <div id="date-picker" class="date-picker" aria-label="계획 날짜 선택"></div>
            <button type="button" id="next-date" class="arrow" aria-label="다음 날짜">›</button>
          </div>

          <form id="plan-form" class="entry">
            <label class="sr-only" for="plan-input">예약할 일</label>
            <input id="plan-input" placeholder="할 일" autocomplete="off" required>
            <button id="plan-submit-button" type="submit">추가</button>
          </form>

          <div id="planned-items" class="items compact"></div>

          <section class="list-builder">
            <div class="section-title">
              <h3>별도 리스트</h3>
              <div class="section-actions">
                <button type="button" id="paste-list-button">붙여넣기</button>
                <button type="button" id="new-list-button">+ 리스트</button>
              </div>
            </div>
            <div id="planned-lists" class="list-chips"></div>
          </section>
        </div>

        <div id="list-view" class="view">
          <header class="screen-header back-header">
            <div>
              <h2 id="list-title">별도 리스트</h2>
              <p id="list-date" class="subline"></p>
            </div>
            <button id="close-list-button" class="back list-close" type="button">닫기</button>
            <div class="header-actions">
              <button id="save-list-button" class="save" type="button">등록</button>
              <button id="delete-list-button" class="remove" type="button">삭제</button>
            </div>
          </header>

          <form id="list-title-form" class="list-editor">
            <label class="sr-only" for="list-title-input">리스트 이름</label>
            <input id="list-title-input" placeholder="리스트명" autocomplete="off" required>
          </form>

          <form id="list-form" class="entry">
            <label class="sr-only" for="list-input">목록 항목</label>
            <input id="list-input" placeholder="항목" autocomplete="off" required>
            <button id="list-submit-button" type="submit">추가</button>
          </form>

          <div id="list-items" class="items"></div>
        </div>

        <div id="login-view" class="view auth-view">
          <header class="screen-header back-header">
            <div>
              <h2>로그인</h2>
              <p class="subline">계정에 저장</p>
            </div>
            <button class="back" type="button" data-view="today-view">닫기</button>
          </header>

          <form id="login-form" class="auth-form">
            <label class="sr-only" for="login-email">이메일</label>
            <input id="login-email" type="email" placeholder="이메일" autocomplete="email" required>
            <label class="sr-only" for="login-password">비밀번호</label>
            <input id="login-password" type="password" placeholder="비밀번호" autocomplete="current-password" required>
            <button type="submit">로그인</button>
          </form>
          <p id="login-message" class="auth-message" aria-live="polite"></p>
        </div>

        <div id="signup-view" class="view auth-view">
          <header class="screen-header back-header">
            <div>
              <h2>회원가입</h2>
              <p class="subline">새 계정 만들기</p>
            </div>
            <button class="back" type="button" data-view="today-view">닫기</button>
          </header>

          <form id="signup-form" class="auth-form">
            <div id="signup-credential-step" class="credential-step">
              <label class="sr-only" for="signup-email">이메일</label>
              <div class="email-row">
                <input id="signup-email" type="email" placeholder="이메일" autocomplete="email" required>
                <button id="email-check-button" type="button">중복확인</button>
              </div>
              <label class="sr-only" for="signup-password">비밀번호</label>
              <input id="signup-password" type="password" placeholder="비밀번호" autocomplete="new-password" required>
              <label class="sr-only" for="signup-password-confirm">비밀번호 확인</label>
              <input id="signup-password-confirm" type="password" placeholder="비밀번호 확인" autocomplete="new-password" required>
            </div>
            <button id="signup-submit-button" type="submit">가입</button>
          </form>
          <p id="signup-message" class="auth-message" aria-live="polite"></p>
        </div>

        <div id="profile-view" class="view auth-view">
          <header class="screen-header back-header">
            <div>
              <h2>별명 설정</h2>
              <p class="subline">가입 완료</p>
            </div>
            <button class="back" type="button" data-view="today-view">닫기</button>
          </header>

          <form id="profile-form" class="auth-form">
            <p class="auth-thanks">가입해주셔서 감사합니다.<br>별명을 설정해주세요.</p>
            <label class="sr-only" for="profile-nickname">별명</label>
            <input id="profile-nickname" placeholder="별명" autocomplete="nickname" required>
            <button id="profile-submit-button" type="submit">완료</button>
          </form>
          <p id="profile-message" class="auth-message" aria-live="polite"></p>
        </div>
      </section>

      <section class="utility-panel" aria-label="데이터 관리">
        <div class="utility-actions">
          <button id="sample-button" type="button">샘플</button>
          <button id="export-button" type="button">백업</button>
          <label class="utility-label">
            복원
            <input id="import-input" type="file" accept="application/json">
          </label>
          <button id="clear-button" type="button">비우기</button>
        </div>
        <p id="status-message" class="storage-note">이 기기에 저장됩니다.</p>
      </section>
      <section class="account-bar" aria-label="계정 저장">
        <p id="account-status" class="storage-note">이 기기에 저장됨</p>
        <div class="account-actions">
          <button id="open-login-button" type="button" data-view="login-view">로그인</button>
          <button id="open-signup-button" type="button" data-view="signup-view">회원가입</button>
          <button id="import-local-button" type="button" hidden>기기 데이터 가져오기</button>
          <button id="logout-button" type="button" hidden>로그아웃</button>
        </div>
      </section>
    </main>
  </body>
</html>
